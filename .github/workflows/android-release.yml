name: Android release APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version name (e.g. 1.0.0)"
        required: true
        default: "1.0.0"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install deps
        working-directory: native
        run: npm ci

      - name: Copy web app + sync platform
        working-directory: native
        run: |
          npm run copy-web
          npx cap sync android

      - name: Decode signing keystore
        run: echo "${{ secrets.ANDROID_KEYSTORE_B64 }}" | base64 -d > "$GITHUB_WORKSPACE/native/android/keystore.p12"

      - name: Build signed release APK
        working-directory: native/android
        env:
          KEYSTORE_FILE: ${{ github.workspace }}/native/android/keystore.p12
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease -PversionCode=${{ github.run_number }} -PversionName=${{ inputs.version }}

      - name: Publish GitHub release with APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK=breath-trainer-${{ inputs.version }}.apk
          cp native/android/app/build/outputs/apk/release/app-release.apk "$APK"
          gh release create "android-v${{ inputs.version }}" "$APK" \
            --title "Breath Trainer Android v${{ inputs.version }}" \
            --notes "Signed Android APK. On your phone: download, allow 'install unknown apps' for your browser when prompted, install. Updates install in place over previous versions — your data is preserved." \
            || gh release upload "android-v${{ inputs.version }}" "$APK" --clobber
